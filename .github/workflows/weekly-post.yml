name: Weekly AI blog post

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write

jobs:
  # Generate the post and get it committed & pushed to main. This is the
  # only job that touches content — if Gemini refuses/errors, or the push
  # can't land, nothing downstream runs and nothing is left half-done.
  generate:
    runs-on: ubuntu-latest
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install automation dependencies
        working-directory: automation
        run: npm install
      - name: Generate blog post
        working-directory: automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run generate
      - name: Commit and push generated post
        id: commit
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add site/src/content/blog automation/latest-post.json automation/content-bank/used-topics.json

          if git diff --cached --quiet; then
            echo "No generated content to commit this run."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "chore(content): weekly AI blog post"

          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "committed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Push attempt $attempt rejected — rebasing onto latest origin/main and retrying..."
            git fetch --no-tags --prune origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "::error::Rebase against origin/main failed — needs manual resolution."
              exit 1
            fi
          done

          echo "::error::Failed to push after 3 attempts."
          exit 1

  # Only runs if generate actually produced and pushed a new post.
  deploy:
    needs: generate
    if: needs.generate.outputs.committed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install site dependencies
        working-directory: site
        run: npm install
      - name: Build site
        working-directory: site
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Only announces on LinkedIn once the article is actually live — never
  # before, and never if the deploy failed for any reason.
  publish-linkedin:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Post latest blog to LinkedIn
        working-directory: automation
        env:
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: node scripts/post-to-linkedin.mjs
