name: Weekly AI blog post

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: write

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install automation dependencies
        working-directory: automation
        run: npm install
      - name: Generate blog post
        working-directory: automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run generate
      - name: Post latest blog to LinkedIn
        working-directory: automation
        env:
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
        run: npm run post-linkedin
      - name: Commit generated post
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Ensure we have the latest remote main and reset our runner branch to it
          git fetch --no-tags --prune origin main
          git checkout -B main origin/main
          git add site/src/content/blog automation/latest-post.json || true
          if git diff --cached --quiet; then
            echo "No generated content to commit."
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: generate weekly AI blog post"
            # Push with lease to avoid overwriting unrelated remote work
            git push --set-upstream origin main --force-with-lease
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: generate-and-post
    if: needs.generate-and-post.outputs.committed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install site dependencies
        working-directory: site
        run: npm install
      - name: Build site
        working-directory: site
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
